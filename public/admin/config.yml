# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Sveltia CMS configuration for the portfolio.
# Editable docs: https://sveltiacms.app/en/docs/

backend:
  name: github
  repo: alexenr02/alexenr02.github.io
  branch: main
  # Prefer the Sveltia CMS Authenticator (Cloudflare Worker) instead of pasting
  # a long-lived GitHub PAT into the browser. Set base_url once the worker is live:
  # base_url: https://your-worker-subdomain.workers.dev
  #
  # Until then: use "Sign In with Token" with a fine-scoped PAT, and revoke it
  # when you are done editing. Never commit tokens to this repo.

# Default media destination. Per-field media_folder values below override
# this for specific cases (logos, resume PDF).
media_folder: public/images
public_folder: /images

# Edits open as pull requests instead of writing straight to main.
# Safer for a public /admin/ surface; merge when ready.
publish_mode: editorial_workflow

collections:
  # ---------------------------------------------------------------------------
  # Single-file collections (settings, hero, about, skills)
  # ---------------------------------------------------------------------------

  - name: site
    label: Site Settings
    description: Site-wide name, SEO meta tags, contact email, and social URLs.
    files:
      - name: site
        label: General
        file: src/content/site/site.json
        format: json
        fields:
          - { name: name, label: Display Name, widget: string }
          - { name: title, label: SEO Title, widget: string }
          - { name: description, label: SEO Description, widget: text }
          - { name: url, label: Site URL, widget: string }
          - { name: author, label: Author Name, widget: string }
          - { name: email, label: Contact Email, widget: string }
          - name: social
            label: Social Links
            widget: object
            fields:
              - { name: github, label: GitHub URL, widget: string }
              - { name: linkedin, label: LinkedIn URL, widget: string }

  - name: hero
    label: Hero Section
    description: The big headline area at the top of the homepage.
    files:
      - name: hero
        label: Hero
        file: src/content/hero/hero.json
        format: json
        fields:
          - { name: name, label: Headline (your name), widget: string }
          - { name: subtitle, label: Subtitle (job title), widget: string }
          - { name: description, label: Description paragraph, widget: text }
          - name: workspaceImage
            label: Workspace Photo
            widget: image
            media_folder: /public/images/hero
            public_folder: /images/hero
            choose_url: false
          - { name: workspaceImageAlt, label: Workspace Photo Alt Text, widget: string }
          - name: primaryCta
            label: Primary Button
            widget: object
            fields:
              - { name: label, label: Button Label, widget: string }
              - { name: href, label: Link / anchor, widget: string }
          - name: secondaryCta
            label: Secondary Button
            widget: object
            fields:
              - { name: label, label: Button Label, widget: string }
              - { name: href, label: Link / anchor, widget: string }

  - name: about
    label: About Section
    description: About Me copy, achievements, education, and the resume download link.
    files:
      - name: about
        label: About
        file: src/content/about/about.json
        format: json
        fields:
          - { name: sectionTitle, label: Section Title, widget: string }
          - name: photo
            label: Photo
            widget: image
            required: false
            media_folder: public/images/about
            public_folder: /images/about
          - { name: photoAlt, label: Photo Alt Text, widget: string, required: false }
          - { name: subheading, label: Subheading, widget: string }
          - { name: tagline, label: One-line tagline, widget: string }
          - name: metrics
            label: Metric chips
            label_singular: Metric
            widget: list
            fields:
              - { name: value, label: Value (e.g. 65%), widget: string }
              - { name: label, label: Label, widget: string }
          - name: education
            label: Education
            widget: object
            fields:
              - { name: school, label: School, widget: string }
              - { name: degree, label: Degree, widget: string }
              - { name: note, label: Extra note (e.g. scholarship), widget: string }
          - name: resume
            label: Resume Download
            widget: object
            fields:
              - name: path
                label: Resume PDF
                widget: file
                media_folder: /public/resume
                public_folder: /resume
              - { name: buttonLabel, label: Button Label, widget: string }

  - name: skills
    label: Skills Section
    description: Highlight skills shown as a board strip. Drag to reorder.
    files:
      - name: skills
        label: Skills
        file: src/content/skills/skills.json
        format: json
        fields:
          - { name: sectionTitle, label: Section Title, widget: string }
          - name: highlights
            label: Skill highlights
            label_singular: Skill
            widget: list
            fields:
              - { name: name, label: Skill name, widget: string }
              - { name: group, label: Group label (e.g. RTOS), widget: string }

  # ---------------------------------------------------------------------------
  # Folder collection (one file per work experience entry)
  # Schema mirrors src/content/config.ts experience collection.
  # ---------------------------------------------------------------------------

  - name: experience
    label: Work Experience
    label_singular: Experience Entry
    description: One entry per role. Order field controls timeline order (lower = first).
    folder: src/content/experience
    extension: mdx
    format: yaml-frontmatter
    create: true
    slug: '{{order}}-{{slug}}'
    identifier_field: company
    summary: '{{position}} at {{company}}'
    sortable_fields: [order, startDate, company]
    fields:
      - { name: company, label: Company, widget: string }
      - { name: position, label: Position / Title, widget: string }
      - { name: location, label: Location, widget: string, required: false }
      - name: logo
        label: Company Logo
        widget: image
        required: false
        media_folder: /public/images/companies
        public_folder: /images/companies
        choose_url: false
      - { name: logoAlt, label: Logo Alt Text, widget: string, required: false }
      - name: startDate
        label: Start Date
        widget: datetime
        time_format: false
        date_format: 'YYYY-MM-DD'
        format: 'YYYY-MM-DD'
        picker_utc: true
      - name: endDate
        label: End Date (leave empty for current role)
        widget: datetime
        required: false
        time_format: false
        date_format: 'YYYY-MM-DD'
        format: 'YYYY-MM-DD'
        picker_utc: true
      - { name: description, label: Short Description, widget: text }
      - name: responsibilities
        label: Responsibilities / Bullets
        widget: list
        required: false
        field: { name: item, label: Bullet, widget: text }
      - name: achievements
        label: Achievements (optional, separate from bullets)
        widget: list
        required: false
        field: { name: item, label: Achievement, widget: string }
      - name: technologies
        label: Technology Tags
        widget: list
        required: false
        field: { name: tech, label: Tech, widget: string }
      - name: order
        label: Order (lower = first in timeline)
        widget: number
        required: false
        value_type: int
      - { name: featured, label: Featured, widget: boolean, default: false, required: false }
